<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta viewport yang sangat penting untuk mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frame IG @kalarenung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pattern untuk menunjukkan area transparan pada preview web */
        .checkerboard {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #f3f4f6 25%, transparent 25%), 
                linear-gradient(-45deg, #f3f4f6 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f3f4f6 75%), 
                linear-gradient(-45deg, transparent 75%, #f3f4f6 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* Frame aslinya dikunci origin-nya agar mudah di-scale JS */
        #export-frame {
            transform-origin: top left;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center h-[100dvh] w-full overflow-hidden font-sans text-gray-800 antialiased selection:bg-blue-200">

    <div class="w-full max-w-[420px] h-[100dvh] bg-white flex flex-col relative shadow-2xl sm:border-x sm:border-gray-300 overflow-hidden">

    <!-- AREA STAGE (PREVIEW - Mengisi Sisa Ruang Tengah) -->
    <div id="stage-area" class="bg-gray-50 flex-1 w-full flex justify-center items-center relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-gray-100/50 to-transparent pointer-events-none"></div>
        
        <!-- Wrapper Frame (Ukuran dinamis oleh JS) -->
        <div id="print-zone" class="relative checkerboard overflow-hidden border border-gray-200/60 shadow-lg rounded-xl bg-white z-10 transition-transform duration-300 hover:scale-[1.02]">
            
            <!-- Kanvas Frame Ukuran Asli 1080x1350 -->
            <div id="export-frame" class="w-[1080px] h-[1350px] absolute top-0 left-0 bg-transparent">
                    
                    <!-- LAYER BELAKANG: Foto yang di-upload -->
                    <img id="uploaded-image" src="" class="absolute top-0 left-0 w-full h-full object-cover z-0 hidden transition-opacity duration-500" alt="Uploaded Photo" crossorigin="anonymous" />

                    <!-- LAYER DEPAN: Bagian Bawah Frame (Warna Krem Putih & Berombak) -->
                    <div class="absolute bottom-0 left-0 w-full h-[150px] z-10">
                        <!-- SVG Ombak Krem Putih -->
                        <svg class="absolute top-0 left-0 w-full h-[50px] block" viewBox="0 0 1000 105" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M 0 50 C 75 100, 175 100, 250 50 C 325 0, 425 0, 500 50 C 575 100, 675 100, 750 50 C 825 0, 925 0, 1000 50 L 1000 105 L 0 105 Z" fill="#FBF8F1"></path>
                        </svg>
                        
                        <!-- Box Solid Krem Putih tempat Teks -->
                    <div class="absolute bottom-0 left-0 w-full h-[100px] bg-[#FBF8F1] flex items-center justify-center pb-4">
                        <!-- Teks Username HANYA teks tanpa ikon -->
                        <span id="username-preview" class="text-[#2d3748] font-bold text-[38px] leading-none tracking-normal">
                            @kalarenung
                        </span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- KONTROL / TOMBOL (Menempel di Bawah) -->
    <div class="p-4 pb-5 flex flex-col gap-3 bg-white z-20 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)] border-t border-gray-100 shrink-0">
        
        <!-- Input Username Dinamis -->
        <div>
            <input type="text" id="username-input" value="@kalarenung" placeholder="Ketik nama akun..." oninput="updateUsername()" class="w-full bg-gray-50 border-2 border-gray-200 text-gray-800 text-base font-bold rounded-xl px-4 py-2.5 focus:outline-none focus:border-gray-900 focus:bg-white transition-colors placeholder-gray-400">
        </div>

        <!-- Baris Tombol Bersebelahan -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Tombol Upload Foto (Secondary Style) -->
            <button onclick="document.getElementById('image-input').click()" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-2.5 px-2 rounded-xl transition-all duration-200 flex items-center justify-center gap-1.5 border-2 border-gray-200 active:scale-[0.98] text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span id="btn-text-upload" class="truncate">Pilih Foto</span>
            </button>
            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">

            <!-- Tombol Download (Primary Style) -->
            <button id="download-btn" onclick="downloadDirectPNG()" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-2.5 px-2 rounded-xl transition-all duration-200 flex items-center justify-center gap-1.5 shadow-[0_8px_20px_-6px_rgba(0,0,0,0.4)] active:scale-[0.98] text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span id="btn-text-download" class="truncate">Simpan HD</span>
            </button>
        </div>
            
    </div> <!-- Penutup Kontainer Aplikasi -->

    <script>
        // Fungsi Penyesuaian Skala Preview (Dinamis untuk HP & Laptop)
        function adjustPreviewScale() {
            const stage = document.getElementById('stage-area');
            const printZone = document.getElementById('print-zone');
            const exportFrame = document.getElementById('export-frame');
            
            if (!stage || !printZone || !exportFrame) return;

            // Margin/Padding aman (40px) agar tidak menabrak tombol atau pinggir layar
            const padding = 40; 
            const availableWidth = stage.clientWidth - padding;
            const availableHeight = stage.clientHeight - padding;

            // Logika Rasio Tetap 4:5 (1080x1350)
            let calcWidth = availableWidth;
            let calcHeight = calcWidth * (1350 / 1080);

            // Jika tingginya melebihi layar (kasus di Laptop/Desktop), gunakan batas tinggi sebagai patokan utama
            if (calcHeight > availableHeight) {
                calcHeight = availableHeight;
                calcWidth = calcHeight * (1080 / 1350);
            }

            // Terapkan batas ukuran ke wadah luar
            printZone.style.width = calcWidth + 'px';
            printZone.style.height = calcHeight + 'px';

            // Perkecil isi visual frame tanpa mengubah ukuran asli export-nya
            const scale = calcWidth / 1080;
            exportFrame.style.transform = `scale(${scale})`;
        }

        // Pantau ukuran layar setiap saat agar tetap responsif
        window.addEventListener('resize', adjustPreviewScale);
        // Jalankan saat aplikasi pertama kali dibuka
        setTimeout(adjustPreviewScale, 50);

        // Fungsi Live Update Text Username
        function updateUsername() {
            const inputVal = document.getElementById('username-input').value;
            // Tampilkan teks default jika input dikosongkan
            const displayVal = inputVal.trim() === '' ? '@kalarenung' : inputVal;
            document.getElementById('username-preview').innerText = displayVal;
        }

        // Fungsi untuk menangani foto yang diupload ke UI Preview
        function previewImage(event) {
            const input = event.target;
            const file = input.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('uploaded-image');
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    
                    // UX: Ubah teks tombol setelah foto dipilih
                    document.getElementById('btn-text-upload').innerText = 'Ganti Foto';
                    document.getElementById('btn-text-download').innerText = 'Simpan HD';
                };
                reader.readAsDataURL(file);
            }
        }

        // Fungsi menggambar Frame ke dalam format PNG murni tanpa Library
        function downloadDirectPNG() {
            const btn = document.getElementById('download-btn');
            const btnText = document.getElementById('btn-text-download');
            const originalHTML = btn.innerHTML;
            btnText.innerText = 'Memproses...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            // Buat kanvas di memori berukuran asli IG (1080x1350)
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1350;
            const ctx = canvas.getContext('2d');

            // 1. Gambar foto yang diupload pengguna (Jika Ada)
            const imgElement = document.getElementById('uploaded-image');
            if (imgElement.src && imgElement.src !== window.location.href && !imgElement.classList.contains('hidden')) {
                const img = new Image();
                img.onload = function() {
                    drawCoverImage(ctx, img, canvas.width, canvas.height);
                    drawOverlayAndDownload();
                };
                img.src = imgElement.src;
            } else {
                // Jika tidak ada foto, canvas langsung proses overlay
                drawOverlayAndDownload();
            }

            // Logika Object-Fit: Cover untuk Kanvas Murni
            function drawCoverImage(ctx, img, canvasWidth, canvasHeight) {
                const imgRatio = img.width / img.height;
                const canvasRatio = canvasWidth / canvasHeight;
                let drawWidth, drawHeight, offsetX, offsetY;

                if (imgRatio > canvasRatio) {
                    drawHeight = canvasHeight;
                    drawWidth = img.width * (canvasHeight / img.height);
                    offsetX = (canvasWidth - drawWidth) / 2;
                    offsetY = 0;
                } else {
                    drawWidth = canvasWidth;
                    drawHeight = img.height * (canvasWidth / img.width);
                    offsetX = 0;
                    offsetY = (canvasHeight - drawHeight) / 2;
                }
                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
            }

            // Fungsi untuk menggambar ombak dan teks, lalu Download
            function drawOverlayAndDownload() {
                const waveHeight = 50;
                const boxHeight = 100;
                const waveY = canvas.height - boxHeight - waveHeight; // 1200
                const boxY = canvas.height - boxHeight; // 1250

                // Gambar Ombak
                const svgString = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="50" preserveAspectRatio="none" viewBox="0 0 1000 105">
                        <path d="M 0 50 C 75 100, 175 100, 250 50 C 325 0, 425 0, 500 50 C 575 100, 675 100, 750 50 C 825 0, 925 0, 1000 50 L 1000 105 L 0 105 Z" fill="#FBF8F1"></path>
                    </svg>
                `;
                const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                const waveImg = new Image();
                
                waveImg.onload = function() {
                    // Gambar layer ombak krem putih
                    ctx.drawImage(waveImg, 0, waveY, canvas.width, waveHeight);
                    
                    // Gambar kotak solid krem putih
                    ctx.fillStyle = '#FBF8F1';
                    ctx.fillRect(0, boxY, canvas.width, boxHeight);

                    // Tulis Teks dengan Presisi Matematika
                    ctx.fillStyle = '#2d3748'; // Warna teks sama persis dengan UI
                    ctx.font = 'bold 38px Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // Mengangkat teks sedikit karena padding pb-4 (di sini diset -8px dari titik tengah vertical kotak)
                    const textY = boxY + (boxHeight / 2) - 8; 
                    
                    // Ambil teks yang sedang diketik user saat ini
                    const currentUsername = document.getElementById('username-preview').innerText;
                    
                    // Render teks dinamis
                    ctx.fillText(currentUsername, canvas.width / 2, textY);

                    // Bersihkan nama file dari karakter aneh untuk nama unduhan
                    const cleanFileName = currentUsername.replace(/[^a-zA-Z0-9]/g, '');

                    // Picu download PNG HD
                    const downloadLink = document.createElement('a');
                    downloadLink.download = `Frame-${cleanFileName}-HD.png`;
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.click();

                    // Kembalikan UI Tombol
                    URL.revokeObjectURL(url);
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btn.disabled = false;
                };
                waveImg.src = url;
            }
        }
    </script>
</body>
</html>
