<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame IG @renungmenung</title>
    <!-- Tailwind CSS untuk styling yang cepat dan rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js untuk export ke PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- html2canvas untuk opsi export ke PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Pattern untuk menunjukkan area transparan pada preview web */
        .checkerboard {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-white p-6 rounded-2xl shadow-md border border-gray-200 flex flex-col items-center">
        <h1 class="text-xl font-bold text-gray-800 mb-2">Frame Generator</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">Rasio 4:5. Latar kotak-kotak menandakan area transparan.</p>

        <!-- Container Preview Frame -->
        <!-- Memiliki styling kotak-kotak agar user tahu ini transparan -->
        <div id="preview-container" class="relative w-[300px] h-[375px] checkerboard rounded-sm overflow-hidden shadow-inner mb-8 border border-gray-300">
            
            <!-- Area spesifik yang akan di-export (tanpa checkerboard) -->
            <div id="export-frame" class="w-full h-full relative" style="background-color: transparent;">
                
                <!-- Bagian Bawah Frame (Berombak / Wavy, Warna Krem) -->
                <div class="absolute bottom-0 left-0 w-full h-[10%]">
                    <!-- SVG Ombak warna Krem -->
                    <svg class="absolute top-0 left-0 w-full h-1/3 block" viewBox="0 0 1000 105" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 0 50 C 75 100, 175 100, 250 50 C 325 0, 425 0, 500 50 C 575 100, 675 100, 750 50 C 825 0, 925 0, 1000 50 L 1000 105 L 0 105 Z" fill="#F5E6D3"></path>
                    </svg>
                    
                    <!-- Box Solid Krem -->
                    <div class="absolute bottom-0 left-0 w-full h-2/3 bg-[#F5E6D3] flex items-center justify-center gap-1.5">
                        <!-- Icon Instagram SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-800">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                        <!-- Teks Akun dengan warna gelap kontras -->
                        <span class="text-gray-800 font-medium tracking-widest text-sm pt-[2px]">
                            @renungmenung
                        </span>
                    </div>
                </div>

            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3 w-full">
            <button onclick="downloadPDF()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Download PDF
            </button>
            
            <!-- Opsi PNG ditambahkan karena PNG adalah standar terbaik untuk frame transparan/overlay -->
            <button onclick="downloadPNG()" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-medium py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download PNG
            </button>
        </div>
    </div>

    <script>
        // Fungsi untuk mengunduh sebagai PDF
        function downloadPDF() {
            const element = document.getElementById('export-frame');
            
            const opt = {
                margin:       0,
                filename:     'frame-renungmenung.pdf',
                image:        { type: 'png', quality: 1 },
                html2canvas:  { 
                    scale: 3, 
                    backgroundColor: null, // Menjaga background tetap transparan di dalam PDF
                    logging: false
                }, 
                jsPDF:        { 
                    unit: 'in', 
                    format: [4, 5], 
                    orientation: 'portrait' 
                }
            };

            html2pdf().set(opt).from(element).save();
        }

        // Fungsi untuk mengunduh sebagai PNG
        function downloadPNG() {
            const element = document.getElementById('export-frame');
            
            html2canvas(element, {
                scale: 4, // Skala besar agar hasil gambar HD
                backgroundColor: null, // Memastikan background transparan
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'frame-renungmenung.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
